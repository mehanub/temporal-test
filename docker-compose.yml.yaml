version: '3.8'

services:
  # Temporal Server
  temporal:
    image: temporalio/auto-setup:latest
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=postgres
    ports:
      - "7233:7233"
    depends_on:
      - postgres
    networks:
      - temporal-network

  # Temporal UI
  temporal-ui:
    image: temporalio/ui:latest
    ports:
      - "8080:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal
    networks:
      - temporal-network

  # PostgreSQL для Temporal
  postgres:
    image: postgres:15
    environment:
      - POSTGRES_USER=temporal
      - POSTGRES_PASSWORD=temporal
      - POSTGRES_DB=temporal
    ports:
      - "5432:5432"
    networks:
      - temporal-network

  # Mock Service 1: Inventory
  service1-inventory:
    build: ./mock-services
    command: node service1-inventory.js
    ports:
      - "3001:3001"
    networks:
      - temporal-network

  # Mock Service 2: Payment
  service2-payment:
    build: ./mock-services
    command: node service2-payment.js
    ports:
      - "3002:3002"
    networks:
      - temporal-network

  # Mock Service 3: Order
  service3-order:
    build: ./mock-services
    command: node service3-order.js
    ports:
      - "3003:3003"
    networks:
      - temporal-network

networks:
  temporal-network:
    driver: bridge